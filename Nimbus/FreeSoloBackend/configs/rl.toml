model = "Qwen/Qwen3.5-4B"
algorithm = "grpo"
seed = 42

# Warm-start from a finished SFT run for best results:
# init_from_adapter = "<sft-run-id>"

[environment]
id = "nimbus/voice-drone-objective"

[train]
epochs = 1
max_examples = 500
# Omit lora_rank/lora_alpha when using init_from_adapter
lora_rank = 32
lora_alpha = 64
group_size = 4
max_completion_tokens = 256
structured_outputs = { json_object = true }
