model = "Qwen/Qwen3.5-4B"
algorithm = "sft"
seed = 42

[environment]
id = "nimbus/voice-drone-objective"

# Optimal for sequential JSON on proven 4B path:
# 2 epochs x 10k (schema lock without heavy template overfitting)
[train]
epochs = 2
max_examples = 10000
lora_rank = 64
lora_alpha = 128
max_context_tokens = 3072
